<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jack Tang - Personal Webpage</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #1a0033 0%, #2d0052 25%, #3d1066 50%, #2d0052 75%, #1a0033 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        /* Floating Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: float 20s infinite ease-in-out;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(138, 43, 226, 0.8), rgba(138, 43, 226, 0));
            top: -10%;
            left: 10%;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(75, 0, 130, 0.8), rgba(75, 0, 130, 0));
            bottom: 5%;
            right: 15%;
            animation-delay: 3s;
        }

        .orb-3 {
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, rgba(138, 43, 226, 0.7), rgba(138, 43, 226, 0));
            top: 50%;
            right: 5%;
            animation-delay: 6s;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0);
            }
            33% {
                transform: translate(30px, -50px);
            }
            66% {
                transform: translate(-30px, 50px);
            }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        /* Glassmorphism Card */
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 60px 80px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: slideUpIn 0.8s ease-out;
        }

        @keyframes slideUpIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Name with Gradient Shimmer */
        .name {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #a855f7, #d946ef, #a855f7);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s ease-in-out infinite, slideUpIn 0.8s ease-out 0.1s backwards;
        }

        @keyframes shimmer {
            0%, 100% {
                background-position: 0% center;
            }
            50% {
                background-position: 100% center;
            }
        }

        /* Clock */
        .clock {
            font-size: 4rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.95);
            margin-bottom: 20px;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.1em;
            animation: slideUpIn 0.8s ease-out 0.2s backwards;
        }

        /* Date */
        .date {
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 0.05em;
            animation: slideUpIn 0.8s ease-out 0.3s backwards;
        }

        /* Subtle text accent */
        .subtitle {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 25px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            animation: slideUpIn 0.8s ease-out 0.4s backwards;
        }
    </style>
</head>
<body>
    <!-- Floating Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Main Content -->
    <div class="container">
        <div class="card">
            <div class="name">Jack Tang</div>
            <div class="clock" id="clock">00:00:00</div>
            <div class="date" id="date"></div>
            <div class="subtitle">Personal Webpage</div>
        </div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            
            // Update Clock
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
            
            // Update Date
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const dateString = now.toLocaleDateString('en-US', options);
            document.getElementById('date').textContent = dateString;
        }
        
        // Initial update
        updateTime();
        
        // Update every second
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
