<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jack Tang - Personal Webpage</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg1: #0f0522;
            --bg2: #21004a;
            --bg3: #3b0b6f;
            --accent1: #9b5cff;
            --accent2: #d16ce8;
            --glass: rgba(255,255,255,0.06);
        }

        body {
            font-family: 'Outfit', 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(120deg, var(--bg1), var(--bg2), var(--bg3));
            background-size: 300% 300%;
            animation: gradientShift 18s ease infinite;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.55;
            mix-blend-mode: screen;
            transform: translate3d(0,0,0);
        }

        .orb-1 { width: 360px; height: 360px; background: radial-gradient(circle at 30% 30%, rgba(155,92,255,0.9), rgba(155,92,255,0)); top: -8%; left: 6%; animation: float 22s infinite ease-in-out; }
        .orb-2 { width: 300px; height: 300px; background: radial-gradient(circle at 70% 70%, rgba(81,45,168,0.85), rgba(81,45,168,0)); bottom: -6%; right: 8%; animation: float 24s infinite ease-in-out; opacity:0.45 }
        .orb-3 { width: 420px; height: 420px; background: radial-gradient(circle at 50% 50%, rgba(209,108,232,0.7), rgba(209,108,232,0)); top: 40%; right: -10%; animation: float 26s infinite ease-in-out; opacity:0.5 }

        @keyframes float {
            0% { transform: translateY(0) translateX(0); }
            25% { transform: translateY(-30px) translateX(20px); }
            50% { transform: translateY(0) translateX(40px); }
            75% { transform: translateY(30px) translateX(20px); }
            100% { transform: translateY(0) translateX(0); }
        }

        /* Main Container */
        .container { position: relative; z-index: 20; width: 100%; max-width: 920px; padding: 24px; display:flex; justify-content:center }

        /* Glassmorphism Card */
        .card {
            width: 100%;
            max-width: 720px;
            background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
            backdrop-filter: blur(14px) saturate(120%);
            -webkit-backdrop-filter: blur(14px) saturate(120%);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 48px 56px;
            box-shadow: 0 10px 40px rgba(2,6,23,0.6);
            transition: transform 0.45s cubic-bezier(.2,.9,.3,1), box-shadow 0.45s ease;
            transform: translateZ(0);
            overflow: hidden;
        }

        .card:hover { transform: translateY(-12px) scale(1.01); box-shadow: 0 30px 80px rgba(2,6,23,0.7); }

        /* Staggered fade-up for children */
        .fade-item { opacity: 0; transform: translateY(18px); animation: fadeUp 0.9s cubic-bezier(.2,.9,.3,1) forwards; }
        .fade-item:nth-of-type(1) { animation-delay: 0.08s }
        .fade-item:nth-of-type(2) { animation-delay: 0.2s }
        .fade-item:nth-of-type(3) { animation-delay: 0.34s }
        .fade-item:nth-of-type(4) { animation-delay: 0.48s }

        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        /* Name with Gradient Shimmer */
        .name { font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 800; margin-bottom: 18px; line-height:1; letter-spacing:-0.02em; background: linear-gradient(90deg, var(--accent1), var(--accent2)); background-size:200% 100%; -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent; animation: shimmer 4s ease-in-out infinite; }
        @keyframes shimmer { 0%,100%{ background-position:0% } 50%{ background-position:100% } }

        .clock { font-size: clamp(2rem, 6vw, 3.6rem); font-weight:700; color: rgba(255,255,255,0.95); margin-bottom:8px; font-variant-numeric: tabular-nums; letter-spacing:0.08em }
        .date { font-size: 1rem; color: rgba(255,255,255,0.78); margin-bottom:10px }
        .subtitle { font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-top:12px; text-transform:uppercase; letter-spacing:0.12em }

        /* Responsive */
        @media (max-width: 720px) {
            .card { padding: 28px 22px; border-radius: 16px }
            .container { padding: 18px }
            .orb-1 { width: 260px; height: 260px; top: -12%; left: -6% }
            .orb-2 { width: 200px; height: 200px; right: -6%; bottom: -10% }
            .orb-3 { width: 300px; height: 300px; right: -14%; top: 48% }
        }

        @media (max-width: 420px) {
            .name { font-size: 1.6rem }
            .clock { font-size: 2rem }
            .card { padding: 20px }
        }
    </style>
</head>
<body>
    <!-- Floating Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Main Content -->
    <div class="container">
        <div class="card">
            <div class="name fade-item">Jack Tang</div>
            <div class="clock fade-item" id="clock">00:00:00</div>
            <div class="date fade-item" id="date"></div>
            <div class="subtitle fade-item">Personal Webpage</div>
        </div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            
            // Update Clock
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
            
            // Update Date
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const dateString = now.toLocaleDateString('en-US', options);
            document.getElementById('date').textContent = dateString;
        }
        
        // Initial update
        updateTime();
        
        // Update every second
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
