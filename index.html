<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jack Tang — Personal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg">
    <div class="orb orb--1"></div>
    <div class="orb orb--2"></div>
    <div class="orb orb--3"></div>
  </div>

  <main class="wrap">
    <section class="card fade-up" style="--delay:0s">
      <h1 class="name shimmer">Jack Tang</h1>
      <p class="subtitle">Creative Developer &amp; Designer</p>
      <div class="datetime">
        <div id="date" class="date"></div>
        <div id="time" class="time" aria-live="polite"></div>
      </div>
    </section>
    <footer class="credits fade-up" style="--delay:0.15s">Built with glassmorphism • Fonts: Outfit &amp; Inter</footer>
  </main>

  <script>
  function pad(v){return v.toString().padStart(2,'0')}
  function updateClock(){
    const now = new Date();
    const timeEl = document.getElementById('time');
    const dateEl = document.getElementById('date');
    if(!timeEl || !dateEl) return;

    const h = pad(now.getHours());
    const m = pad(now.getMinutes());
    const s = pad(now.getSeconds());
    timeEl.textContent = `${h}:${m}:${s}`;

    const opts = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
    dateEl.textContent = new Intl.DateTimeFormat(undefined, opts).format(now);
  }

  document.addEventListener('DOMContentLoaded',()=>{
    const items = document.querySelectorAll('.fade-up');
    items.forEach((el,i)=>el.style.setProperty('--delay', `${i*0.08}s`));
    updateClock();
    setInterval(updateClock,1000);
  });
  </script>
</body>
</html>
